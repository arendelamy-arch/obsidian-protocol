<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Protocol | Terminal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .dashboard { padding: 30px; border: 2px solid #00ffcc; border-radius: 12px; background: rgba(0, 255, 204, 0.05); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); width: 400px; text-align: center; }
        h2 { letter-spacing: 2px; margin-bottom: 25px; color: #00ffcc; }
        input { background: #111; border: 1px solid #00ffcc; color: #fff; padding: 12px; width: 80%; margin-bottom: 15px; outline: none; border-radius: 4px; }
        button { background: #00ffcc; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 90%; border-radius: 4px; text-transform: uppercase; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #stats { margin-top: 25px; text-align: left; padding-left: 20px; border-top: 1px solid #333; padding-top: 15px; color: #00ffcc; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>// OBSIDIAN_PROTOCOL</h2>
        <input type="email" id="u-email" placeholder="ENTER_AGENT_EMAIL">
        <button onclick="handleAuth()">INITIATE_SEQUENCE</button>
        
        <div id="stats">
            <p>AGENT: <span id="display-email">GUEST_ID</span></p>
            <p>FOCUS_POINTS: <span id="display-fp">0</span></p>
            <p>STRIKES: <span id="display-strikes">3</span></p>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyACSD27YtmNpdXp4W3yngnOBUwTMxXDwV8",
            authDomain: "obsidan-protcol.firebaseapp.com",
            projectId: "obsidan-protcol",
            storageBucket: "obsidan-protcol.firebasestorage.app",
            messagingSenderId: "763765262926",
            appId: "1:763765262926:web:61abfa003560f036bc511f"
        };

        // 2. Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 3. Send Login Link
        function handleAuth() {
            const email = document.getElementById('u-email').value;
            if(!email) return alert("INPUT_REQUIRED: Enter Agent Email");

            const actionCodeSettings = {
                // Must be the exact URL of your GitHub Page
                url: window.location.href, 
                handleCodeInApp: true
            };

            auth.sendSignInLinkToEmail(email, actionCodeSettings)
                .then(() => {
                    window.localStorage.setItem('emailForSignIn', email);
                    alert("TRANSMISSION_SENT. Check your email for the access link.");
                })
                .catch((error) => {
                    console.error("Auth Error:", error.code, error.message);
                    alert("SIGNAL ERROR [" + error.code + "]: " + error.message);
                });
        }

        // 4. Complete Sign-In (When returning from email)
        if (auth.isSignInWithEmailLink(window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            
            // If the user opened the link on a different device/browser
            if (!email) {
                email = window.prompt('Please provide your email for confirmation:');
            }

            auth.signInWithEmailLink(email, window.location.href)
                .then((result) => {
                    window.localStorage.removeItem('emailForSignIn');
                    // Clean the URL hash/query
                    window.history.replaceState({}, document.title, window.location.pathname);
                    console.log("Logged in successfully:", result.user.email);
                })
                .catch((error) => {
                    console.error("Link Error:", error.code);
                    alert("LINK_ERROR: The link may have expired or was already used.");
                });
        }

        // 5. Observer to load data
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('display-email').innerText = user.email;
                db.collection("users").doc(user.email).get().then((doc) => {
                    if (doc.exists) {
                        document.getElementById('display-fp').innerText = doc.data().focusPoints || 0;
                        document.getElementById('display-strikes').innerText = doc.data().strikes || 3;
                    }
                });
            }
        });
    </script>
</body>
</html>
